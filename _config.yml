# _config.yml (for GitHub Pages)
title: Kepvisha's Blog
email: 1036305676@qq.com
description: >-
  Kepvisha的个人博客，探索MCPK、数学、计算机科学和旅行的世界
baseurl: "/your-repository-name"
url: "https://yourusername.github.io"

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-paginate

# Pagination settings
paginate: 5
paginate_path: "/blog/page:num/"

# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
